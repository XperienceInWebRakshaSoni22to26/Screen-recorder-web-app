<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Recorder</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

        <h1>🎥 Screen Recorder</h1>

        <p class="subtitle">
             Record your screen, microphone, preview it and download as a WebM file.
        </p>

        <div class="buttons">

            <button id="startBtn">
                Start Recording
            </button>

            <button id="pauseBtn" disabled>
                Pause
            </button>

            <button id="resumeBtn" disabled>
                Resume
            </button>

            <button id="stopBtn" disabled>
                Stop
            </button>

        </div>

        <div class="preview">

            <h2>Preview</h2>

            <video
                id="previewVideo"
                controls>
            </video>

        </div>

        <button
            id="downloadBtn"
            disabled>

            Download Recording

        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
